{{ define "main" }}
  <section class="section">
    <div class="section-header">
      <h1 class="section-title">{{ .Title }}</h1>
      <p class="section-subtitle">生活随笔，读书心得</p>
    </div>

    <div class="article-list">
      {{ range .Pages }}
        <article class="article-card-large fade-in" data-url="{{ .RelPermalink }}">
          <h2 class="article-card-large-title">
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          </h2>
          <div class="article-card-large-meta">
            <time>{{ .Date.Format "2006-01-02" }}</time>
            {{ if .Params.tags }}
              <span>·</span>
              <span>
                {{ range $i, $tag := .Params.tags }}
                  {{ if $i }}, {{ end }}
                  <a href="{{ "/tags/" | relLangURL }}{{ $tag | urlize }}/" class="tag" data-no-click>{{ $tag }}</a>
                {{ end }}
              </span>
            {{ end }}
          </div>
          <p class="article-card-large-summary">
            {{ .Summary | truncate 150 }}
          </p>
        </article>
      {{ end }}
    </div>
  </section>
{{ end }}
