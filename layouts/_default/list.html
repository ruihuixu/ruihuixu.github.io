{{ define "main" }}
  <section class="section">
    <div class="section-header">
      <h1 class="section-title">{{ .Title }}</h1>
      {{ if .Description }}
        <p class="section-subtitle">{{ .Description }}</p>
      {{ end }}
    </div>

    <!-- 分页导航 -->
    {{ partial "pagination.html" . }}

    <div class="card-grid">
      {{ range .Pages }}
        {{ partial "card.html" (dict "page" . "context" $) }}
      {{ end }}
    </div>
  </section>
{{ end }}
