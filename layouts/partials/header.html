<header class="header" id="header">
  <div class="header-container">
    <a href="{{ .Site.Home.RelPermalink }}" class="header-logo">
      {{ .Site.Title }}
    </a>

    <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="header-nav" id="headerNav">
      {{ range .Site.Menus.main }}
        {{ if not .HasChildren }}
          <a href="{{ .URL }}" class="header-nav-link {{ if $.IsMenuCurrent `main` . }}active{{ end }}">
            {{ .Name }}
          </a>
        {{ else }}
          <!-- 有子菜单的项 -->
          <div class="header-nav-dropdown">
            <a href="{{ .URL }}" class="header-nav-link dropdown-toggle {{ if $.HasMenuCurrent `main` . }}active{{ end }}">
              {{ .Name }}
              <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </a>
            <div class="dropdown-menu">
              {{ range .Children }}
                <a href="{{ .URL }}" class="dropdown-item {{ if $.IsMenuCurrent `main` . }}active{{ end }}">
                  {{ .Name }}
                </a>
              {{ end }}
            </div>
          </div>
        {{ end }}
      {{ end }}
    </nav>
  </div>
</header>

<script>
  // 移动端菜单切换
  const menuToggle = document.getElementById('menuToggle');
  const headerNav = document.getElementById('headerNav');

  if (menuToggle) {
    menuToggle.addEventListener('click', () => {
      menuToggle.classList.toggle('active');
      headerNav.classList.toggle('active');
    });
  }

  // 滚动时添加阴影效果
  const header = document.getElementById('header');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  });

  // 下拉菜单点击处理（移动端）
  document.querySelectorAll('.dropdown-toggle').forEach(toggle => {
    toggle.addEventListener('click', (e) => {
      if (window.innerWidth <= 768) {
        e.preventDefault();
        const menu = toggle.nextElementSibling;
        menu.classList.toggle('active');
        toggle.classList.toggle('open');
      }
    });
  });
</script>
